name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
      - uses: google-github-actions/setup-gcloud@v2
      - run: gcloud builds submit --tag gcr.io/${{ secrets.GCP_PROJECT_ID }}/creativeops-agent
      - run: gcloud run deploy creativeops-agent --image gcr.io/${{ secrets.GCP_PROJECT_ID }}/creativeops-agent --platform managed --region us-central1 --allow-unauthenticated